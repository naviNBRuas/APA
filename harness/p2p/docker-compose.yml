version: "3.9"

services:
  relay:
    build:
      context: ../..
      dockerfile: Containerfile.p2pnode
    command:
      - /app/p2pnode
      - -role
      - relay
      - -listen-addrs
      - /ip4/0.0.0.0/tcp/4001,/ip4/0.0.0.0/udp/4001/quic-v1
      - -announce-file
      - /shared/relay.json
      - -http
      - :8080
      - -service-tag
      - apa-relay
    volumes:
      - ./shared:/shared
    ports:
      - "18080:8080"
      - "4001:4001"
    networks:
      public:
        ipv4_address: 172.28.0.10
      isolated:
        ipv4_address: 172.29.0.10
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  node_a:
    build:
      context: ../..
      dockerfile: Containerfile.p2pnode
    depends_on:
      relay:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        until [ -f /shared/relay.json ]; do sleep 1; done;
        exec /app/p2pnode \
          -role node \
          -bootstrap-file /shared/relay.json \
          -listen-addrs /ip4/0.0.0.0/tcp/4001,/ip4/0.0.0.0/udp/4001/quic-v1 \
          -http :8080 \
          -service-tag apa-edge-a
    volumes:
      - ./shared:/shared
    ports:
      - "18081:8080"
    networks:
      isolated:
        ipv4_address: 172.29.0.11
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  node_b:
    build:
      context: ../..
      dockerfile: Containerfile.p2pnode
    depends_on:
      relay:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        until [ -f /shared/relay.json ]; do sleep 1; done;
        exec /app/p2pnode \
          -role node \
          -bootstrap-file /shared/relay.json \
          -listen-addrs /ip4/0.0.0.0/tcp/4001,/ip4/0.0.0.0/udp/4001/quic-v1 \
          -http :8080 \
          -service-tag apa-edge-b
    volumes:
      - ./shared:/shared
    ports:
      - "18082:8080"
    networks:
      public:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  public:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
  isolated:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
