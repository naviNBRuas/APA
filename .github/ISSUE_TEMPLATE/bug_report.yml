name: Bug report
description: Report a problem to help us improve
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs or attach screenshots if helpful.
      render: text
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      multiple: true
      options:
        - Linux
        - macOS
        - Windows
        - Container/Podman/Docker
  - type: input
    id: version
    attributes:
      label: Version/commit
      description: Provide the commit hash or release tag.
